<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b9d;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#c44dd4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4d7dd4;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#fff;stop-opacity:0" />
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)" />
  <circle cx="200" cy="200" r="180" fill="url(#glow)" />
  <circle cx="150" cy="150" r="80" fill="none" stroke="#fff" stroke-width="2" opacity="0.4" />
  <circle cx="250" cy="250" r="120" fill="none" stroke="#fff" stroke-width="2" opacity="0.3" />
  <circle cx="200" cy="200" r="40" fill="#fff" opacity="0.9" />
  <text x="200" y="210" text-anchor="middle" font-family="Georgia, serif" font-size="24" fill="#c44dd4" font-style="italic">drift</text>
</svg>
